    <style>
        :root {
            --bg-white: #fffdfd;
            --bg-black: #262626;
            --brand-red: #8c0410;
            --text-dark: #1a1a1a;
            --text-gray: #888888;
            --border-color: #e0dfdc;
            --font-title: 'Montserrat Alternates', sans-serif;
            --font-text: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }

        body {
            background-color: var(--bg-white);
            color: var(--text-dark);
            font-family: var(--font-text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .wrap { max-width: 1000px; margin: 0 auto; padding: 0 40px; }
        
        .sec-title-main {
            font-family: var(--font-title);
            font-weight: 900;
            font-size: clamp(32px, 5vw, 56px);
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .sec-subtitle {
            font-family: var(--font-text);
            font-weight: 400;
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .bg-dark { background-color: var(--bg-black); color: var(--bg-white); }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.on { opacity: 1; transform: translateY(0); }

        /* Capa */
        #capa { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 80px 40px; }
        .capa-logos { display: flex; align-items: center; gap: 30px; margin-bottom: 60px; }
        .capa-logos img { height: 35px; object-fit: contain; }
        .capa-divisor { width: 1px; height: 35px; background-color: var(--border-color); }
        
        .capa-saudacao { font-family: var(--font-title); font-weight: 900; font-size: clamp(48px, 8vw, 90px); margin-bottom: 20px; line-height: 1; }
        
        .capa-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 40px 0; }
        .capa-menu a { 
            font-weight: 600; font-size: 13px; letter-spacing: 1px; 
            text-transform: uppercase; text-decoration: none; color: var(--text-dark);
            transition: color 0.3s;
        }
        .capa-menu a:hover { color: var(--brand-red); }
        
        .assinatura-main { font-family: var(--font-text); font-weight: 900; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        .renata-red { color: var(--brand-red); }
        .ig-icon { width: 14px; height: 14px; vertical-align: middle; margin-right: 5px; fill: currentColor; }
        .capa-aviso { font-size: 10px; color: #aaa; max-width: 400px; margin-top: 20px; line-height: 1.5; }

            padding: 40px;
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
